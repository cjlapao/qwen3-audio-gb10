# ==============================================================================
# Global compose — all three services in one file
# ==============================================================================
#
# Usage:
#   # Start ASR + TTS (default, no playground):
#   docker compose up -d
#
#   # Start everything including playground:
#   docker compose --profile playground up -d
#
#   # Stop everything:
#   docker compose down
#
# Override defaults via environment or .env file:
#   IMAGE_PREFIX=...  IMAGE_TAG=...
#   ASR_MODEL_ID=...  ASR_HOST_PORT=...
#   TTS_MODEL_BASE=... TTS_HOST_PORT=... TTS_UI_HOST_PORT=...
#   PLAYGROUND_HOST_PORT=... TTS_BASE_URL=...
# ==============================================================================

services:
  qwen3-tts:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FASTER_QWEN3_TTS_REF: "0.2.6"
        TRANSFORMERS_VERSION: "4.57.3"
        TORCHAUDIO_VERSION: "2.9.1"
    image: cjlapao/qwen3-audio-gb10:latest
    container_name: qwen3-tts
    ports:
      - "8005:8000"
    environment:
      - SERVICE_MODE=tts
      - HF_HOME=/models
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - CUDA_VISIBLE_DEVICES=0
      - VOICES_ROOT=/app/voices
    volumes:
      - ../models:/models
      - ./voices:/app/voices
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/audio/voices"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 240s
    restart: unless-stopped
    logging:
      driver: syslog
      options:
        tag: "qwen3-tts"
        syslog-facility: "local6"

  qwen3-asr:
    image: cjlapao/qwen3-audio-gb10:latest
    container_name: qwen3-asr
    ports:
      - "8004:8000"
    environment:
      - SERVICE_MODE=asr
      - MODEL_BASE=Qwen/Qwen3-ASR-1.7B
      - HF_HOME=/models
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ../models:/models
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s
    restart: unless-stopped
    logging:
      driver: syslog
      options:
        tag: "qwen3-asr"
        syslog-facility: "local6"
  # ──────────────────────────────────────────────────────────────────────────
  # Voice Playground — Gradio UI (opt-in via --profile playground)
  # ──────────────────────────────────────────────────────────────────────────
  voice-playground:
    profiles: ["playground"]
    image: ${IMAGE_PREFIX:-ghcr.io/cjlapao}/voice-playground:${IMAGE_TAG:-latest}
    container_name: voice-playground
    depends_on:
      qwen3-tts:
        condition: service_healthy
    ports:
      - "${PLAYGROUND_HOST_PORT:-8006}:7860"
    environment:
      - TTS_BASE=${TTS_BASE_URL:-http://qwen3-tts:8000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/').close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: syslog
      options:
        tag: "voice-playground"
        syslog-facility: "local6"
