# ==============================================================================
# Development — build from source Dockerfiles locally
# ==============================================================================
# Usage:
#   docker compose --file docker-compose.dev.yml up -d
#
# Override defaults via environment or .env file:
#   IMAGE_PREFIX=...  IMAGE_TAG=...  ASR_MODEL_ID=...  ASR_HOST_PORT=...
# ==============================================================================

services:
  qwen3-asr:
    build:
      context: .
    container_name: qwen3-asr
    ports:
      - "${ASR_HOST_PORT:-8004}:8000"
    environment:
      - MODEL_ID=${ASR_MODEL_ID:-Qwen/Qwen3-ASR-1.7B}
      - HF_HOME=/models
    volumes:
      - ../models:/models
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host
    ulimits: { memlock: -1, stack: 67108864 }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 240s
    restart: unless-stopped
